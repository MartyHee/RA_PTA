# =============================================================================
# 公共评估指标配置
# =============================================================================
# 统一评估指标定义，所有模型共享
# =============================================================================

# 分类指标
classification:
  auc: true
  accuracy: true
  precision: true
  recall: true
  f1: true

# 排序指标
ranking:
  precision_at_k: true
  recall_at_k: true

# Precision@K 和 Recall@K 的 K 值列表
k_values: [5, 10, 20]

# 二分类阈值（默认 0.5）
threshold: 0.5