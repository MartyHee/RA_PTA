# =============================================================================
# 公共数据切分配置
# =============================================================================
# 由 build_tabular_dataset.py / run_experiment 等脚本统一使用
#
# 【切分口径说明】（2026-04-29）
# 1. 当前仅使用 train/eval 切分，不设置独立 test 集
# 2. eval 用于流程验证和最小模型评估，不做为最终测试集
# 3. 当前样本量仅 79 条，train/eval split 结果不稳定
# 4. 正式实验阶段需启用 train/val/test 三路切分或交叉验证
# =============================================================================

# 切分方式：random / stratified / temporal
split_method: random

# 各集比例
train_ratio: 0.8
eval_ratio: 0.2

# 随机种子
random_seed: 2026

# 标签字段名
label_col: label

# 是否打乱
shuffle: true