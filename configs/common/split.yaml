# =============================================================================
# 公共数据切分配置
# =============================================================================
# 标签字段 (label_col) 当前暂定为 'label'，后续由 tabular 数据构建阶段正式确定
# =============================================================================

# 切分方式：random / stratified / temporal
split_method: random

# 各集比例
train_ratio: 0.7
eval_ratio: 0.15
test_ratio: 0.15

# 随机种子
random_seed: 42

# 标签字段名（占位，后续确定）
label_col: label

# 是否打乱
shuffle: true