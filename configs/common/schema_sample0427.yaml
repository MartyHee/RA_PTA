      - unique_id          # MD5 规则生成，非真实 API 值
      - avatar_thumb_url_list  # 占位值，CSV 中为空列表 '[]'
      - cover_url_list         # 占位值，CSV 中为空列表 '[]'
    raw_columns: []
    list_like_columns:
      - avatar_thumb_url_list
      - cover_url_list
    json_like_columns: []
    suggested_usage: "GraphSAGE 作者节点特征，DNN/Wide&Deep 的作者侧特征拼接"
    notes: "short_id / custom_verify / enterprise_verify_reason 整列全空。favoriting_count / following_count 有真实值但部分为 -1 占位。"

