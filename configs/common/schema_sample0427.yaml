      - related_digg_count       # 随机生成
      - related_comment_count    # 随机生成
      - related_share_count      # 随机生成
      - related_collect_count    # 随机生成
      - related_play_count       # 随机生成
      - related_cover_url_list   # 占位值，CSV 中为空列表 '[]'
      - related_music_id         # 从 video_id→music_id 映射规则补齐
      - related_video_tag_raw    # 规则生成 JSON 字符串
    raw_columns:
      - related_text_extra_raw
      - related_video_tag_raw
    list_like_columns:
      - related_cover_url_list
      - related_video_tag_raw    # 虽为 JSON 字符串但以 [ 开头
    json_like_columns:
      - related_text_extra_raw
      - related_video_tag_raw
    suggested_usage: "GraphSAGE 的 video-video 关联边来源（source_video_id → related_video_id），Wide&Deep 的 wide 侧交叉特征来源"
    notes: |
      related_author_sec_uid / related_music_title / related_text_extra_raw / related_chapter_abstract 整列全空。
      source_video_id 可关联 raw_video_detail.video_id。
      整张表为完全补齐，所有有数据的字段均为样本补齐值。
      related_duration_ms 固定为 1000，与 raw_video_detail.duration_ms 的分布完全不同。

  # ---------------------------------------------------------------------------
  # raw_crawl_log — 采集日志表
  # ---------------------------------------------------------------------------
  raw_crawl_log:
    description: "采集日志表，79 条，从源 CSV 入口字段映射，部分字段为占位值"
    data_source: "映射补齐"
    expected_columns:
      - crawl_batch_id
      - crawl_time
      - target_url
      - source_page_type
      - request_url
      - request_cursor
      - response_status
      - response_timestamp
      - response_headers_raw
      - primary_source_key
      - match_type
      - confidence
      - network_response_count
      - runtime_objects_count
    primary_key_candidates:
      - crawl_batch_id
    foreign_key_candidates:
      - {column: primary_source_key, ref_table: raw_video_detail, ref_column: video_id}
    important_columns:
      - crawl_batch_id       # 主键
      - target_url           # 原始采集 URL
      - source_page_type     # 来源页面类型（全部为 'manual_url'）
      - response_status      # HTTP 状态码（全部为 200）
      - response_timestamp   # 响应采集时间
      - primary_source_key   # 主数据来源键（关联 video_id）
      - match_type           # 主对象匹配类型
      - confidence           # 选择置信度
    generated_or_placeholder_columns:
      - network_response_count  # 全部为 -1 占位值
      - runtime_objects_count   # 全部为 -1 占位值
    raw_columns:
      - response_headers_raw
    list_like_columns: []
    json_like_columns:
      - response_headers_raw
    suggested_usage: "数据溯源与质量检查。W4 模型阶段主要作为元数据参考，不作为模型特征输入"
    notes: |
      request_url / request_cursor / response_headers_raw 整列全空。
      source_page_type 全部为 'manual_url'（固定值）。
      response_status 全部为 200。
      整张表主要用于溯源与质量检查。

