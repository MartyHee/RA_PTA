      - unique_id
      - short_id
      - nickname
      - signature
      - follower_count
      - total_favorited
      - favoriting_count
      - following_count
      - verification_type
      - custom_verify
      - enterprise_verify_reason
      - avatar_thumb_url_list
      - cover_url_list
      - author_status
      - author_secret
      - author_prevent_download
      - crawl_time
    primary_key_candidates:
      - author_id
    foreign_key_candidates: []
    important_columns:
      - author_id          # 主键，用于关联
      - nickname           # 作者昵称（真实值）
      - signature          # 签名（真实值，74/78 行有数据）
      - follower_count     # 粉丝数（真实值）
      - total_favorited    # 总获赞（真实值）
      - following_count    # 关注数（真实值，部分 -1）
