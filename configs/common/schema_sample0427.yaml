# =============================================================================
# sample0427 Schema 校验配置
# =============================================================================
# 基于 sample_data_dictionary.md 整理，用于 validate_schema.py 的字段级校验
# =============================================================================

# 全局配置
global:
  high_missing_threshold: 0.8   # 高缺失率阈值
  key_relation_match_threshold: 0.5  # 关联匹配最低阈值（低于此值报 fail）

# =============================================================================
# 表级定义
# =============================================================================
tables:

  # ---------------------------------------------------------------------------
  # raw_video_detail — 核心视频表
  # ---------------------------------------------------------------------------
  raw_video_detail:
    description: "视频核心信息表，79 条真实抓取高置信度样本，含 1 个额外补充字段 author_id"
    data_source: "真实抓取 + 字段补齐"
    expected_columns:
      - video_id
      - sec_item_id
      - group_id
      - comment_gid
      - page_url
      - share_url
      - caption
      - desc
      - preview_title
      - item_title
      - create_time
      - duration_ms
      - aweme_type
      - media_type
      - region
      - is_top
      - is_ads
      - is_life_item
      - original
      - shoot_way
      - digg_count
      - comment_count
      - share_count
      - collect_count
      - play_count
      - recommend_count
      - admire_count
      - crawl_time
      - primary_source_key
      - author_id
    primary_key_candidates:
      - video_id
    foreign_key_candidates:
      - {column: author_id, ref_table: raw_author, ref_column: author_id}
      - {column: group_id, ref_table: null, ref_column: null}
    important_columns:
      - video_id          # 主键
      - author_id         # 关联作者（额外补充字段）
      - group_id          # 分组 ID
      - caption           # 视频描述（文本特征）
      - desc              # 视频描述（文本特征，同 caption）
      - create_time       # 发布时间（时序特征）
      - duration_ms       # 时长（真实毫秒值）
      - aweme_type        # 内容类型
      - media_type        # 媒体类型
      - region            # 地区
      - is_top            # 是否置顶
      - is_ads            # 是否广告
      - is_life_item      # 是否生活服务
      - original          # 是否原创
      - digg_count        # 点赞数（真实值）
      - comment_count     # 评论数（真实值）
      - share_count       # 分享数（真实值）
      - collect_count     # 收藏数（真实值）
      - play_count        # 播放数（全 0，可能为真实 API 返回）
      - recommend_count   # 推荐计数
      - admire_count      # 赞赏计数
    generated_or_placeholder_columns:
      - author_id         # 额外补充字段，为方便关联从源 CSV 映射补充
    raw_columns: []
    list_like_columns: []
    json_like_columns: []
    suggested_usage: "W4 核心表。作为 DNN / Wide & Deep 的标签源和特征源，GraphSAGE 的种子节点，多模态的文本与数值特征来源"
    notes: "author_id 为额外补充字段，非正式 schema 字段。sec_item_id / share_url / preview_title / item_title / shoot_way 整列全空。"

