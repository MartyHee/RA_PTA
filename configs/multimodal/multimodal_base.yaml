# =============================================================================
# 多模态模型基础配置
# =============================================================================
# 当前阶段默认：
#   - 不联网下载图片
#   - 不调用外部 API
#   - 不引入大型预训练模型依赖
#   - 仅使用本地已有字段和轻量特征
# =============================================================================

model_name: multimodal

# ---------------------------------------------------------------------------
# 数据路径
# ---------------------------------------------------------------------------
train_npz_path: data/multimodal/multimodal_train.npz
eval_npz_path: data/multimodal/multimodal_eval.npz
feature_info_path: data/multimodal/multimodal_feature_info.json

metrics_config_path: configs/common/metrics.yaml
output_root: outputs/multimodal

# ---------------------------------------------------------------------------
# 各分支隐层维度
# ---------------------------------------------------------------------------
text_hidden_dim: 32
visual_hidden_dim: 16
structured_hidden_dim: 32
fusion_hidden_dim: 64

# ---------------------------------------------------------------------------
# 训练超参数
# ---------------------------------------------------------------------------
dropout: 0.3
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
epochs: 20
random_seed: 2026
threshold: 0.5
device: cuda

# ---------------------------------------------------------------------------
# 优化器 / 损失函数
# ---------------------------------------------------------------------------
optimizer: adam
loss: bce

# ---------------------------------------------------------------------------
# 当前阶段约束（代码中确认）
# ---------------------------------------------------------------------------
no_image_download: true
no_external_api: true
no_large_pretrained_model: true