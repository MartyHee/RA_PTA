# =============================================================================
# Wide & Deep 模型基础配置
# =============================================================================

model_name: wide_deep

# 训练超参数
batch_size: 64
learning_rate: 0.001
epochs: 20

# Wide 部分
wide_cross_features:
  - author_id_x_top_hashtag
  - author_id_x_music_title
  - duration_bucket_x_top_hashtag
  - has_watermark_x_duration_bucket
wide_activation: relu

# Deep 部分
deep_hidden_units: [256, 128, 64]
dropout: 0.3
deep_activation: relu

# 数据输入路径
train_data_path: "D:/CodeData/Program Coding/ByteDance/RA_PTA/data/features/tabular_train.csv"
eval_data_path: "D:/CodeData/Program Coding/ByteDance/RA_PTA/data/features/tabular_eval.csv"
feature_info_path: "D:/CodeData/Program Coding/ByteDance/RA_PTA/data/features/tabular_feature_info.json"

# 优化器
optimizer: adam

# 损失函数
loss: bce

# 输出目录
output_dir: "D:/CodeData/Program Coding/ByteDance/RA_PTA/outputs/wide_deep"