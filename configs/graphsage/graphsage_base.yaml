# =============================================================================
# GraphSAGE 模型基础配置
# =============================================================================

model_name: graphsage

# 训练超参数
batch_size: 64
learning_rate: 0.001
epochs: 20

# 图神经网络参数
hidden_dim: 64
num_layers: 2
aggregator: mean  # mean / gcn / pool / lstm

# 输出维度（二分类为 1）
output_dim: 1

# 优化器
optimizer: adam

# 损失函数
loss: bce

# 输出目录
output_dir: "D:/CodeData/Program Coding/ByteDance/RA_PTA/outputs/graphsage"