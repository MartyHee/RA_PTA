# =============================================================================
# GraphSAGE 模型基础配置
# =============================================================================
# 包含图数据路径、模型超参数、训练配置和输出设置
# =============================================================================

model_name: graphsage

# ---------------------------------------------------------------------------
# 项目根目录（用于解析相对路径）
# ---------------------------------------------------------------------------
project_root: "D:/CodeData/Program Coding/ByteDance/RA_PTA"

# ---------------------------------------------------------------------------
# 图数据路径
# ---------------------------------------------------------------------------
graph_data_dir: "data/graph"                       # 图数据集输出目录
node_path: "data/graph/nodes.csv"                   # 节点表
edge_path: "data/graph/edges.csv"                   # 边表
node_features_path: "data/graph/node_features.npy"  # 节点特征
labels_path: "data/graph/labels.npy"                # 标签
train_mask_path: "data/graph/train_mask.npy"        # 训练 mask
eval_mask_path: "data/graph/eval_mask.npy"          # 评估 mask
graph_meta_path: "data/graph/graph_meta.json"       # 图元信息

# ---------------------------------------------------------------------------
# 原始数据与特征路径（用于 graph data 构建）
# ---------------------------------------------------------------------------
sample0427_dir: "douyin_data_project/data/sample0427"
features_dir: "data/features"
data_check_dir: "outputs/data_check"

# ---------------------------------------------------------------------------
# 训练超参数
# ---------------------------------------------------------------------------
batch_size: 64
learning_rate: 0.001
epochs: 20
weight_decay: 0.0001
random_seed: 2026

# ---------------------------------------------------------------------------
# 图神经网络参数
# ---------------------------------------------------------------------------
hidden_dim: 64
num_layers: 2
dropout: 0.3
aggregator: mean        # mean / gcn / pool / lstm
output_dim: 1

# ---------------------------------------------------------------------------
# 优化器与损失函数
# ---------------------------------------------------------------------------
optimizer: adam
loss: bce

# ---------------------------------------------------------------------------
# 阈值与设备
# ---------------------------------------------------------------------------
threshold: 0.5
device: auto            # auto / cuda / cpu

# ---------------------------------------------------------------------------
# 输出目录
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# 指标与输出设置
# ---------------------------------------------------------------------------
metrics_config_path: "configs/common/metrics.yaml"

output_root: "outputs/graphsage"